---
layout: layouts/main-template.njk
title: Články
---

<h1 class="section-title">Články</h1>

{% for category in articleCategories %}
    <h2 class="section-subtitle">{{ category.title }}</h2>

    <div class="articles-wrapper">

        {% for prispevek in collections[category.collection] | reverse %}
            {% set post = prispevek %}
            {% include 'partials/article-card.njk' %}
        {% endfor %}

    </div>
{% endfor %}
